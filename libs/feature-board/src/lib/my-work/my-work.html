<div class="cb-my-work">
  <div class="cb-my-work__lens">
    <span class="cb-my-work__lens-dot" [style.background]="store.roleInfo().color"></span>
    <span class="cb-my-work__lens-text">
      Viewing as <strong class="cb-my-work__lens-role">{{ store.roleInfo().name }}</strong>
      · you see only what's yours
    </span>
  </div>

  <div class="cb-my-work__grid">
    @for (g of store.myGroups(); track g.label) {
      <div class="cb-my-work__group">
        <div class="cb-my-work__group-head">
          <span class="cb-my-work__group-dot" [style.background]="g.fg"></span>
          <span class="cb-my-work__group-label" [style.color]="g.fg">{{ g.label }}</span>
          <span class="cb-my-work__group-count">{{ g.count }}</span>
        </div>

        <div class="cb-my-work__list">
          @for (it of g.items; track it.uc) {
            <div
              class="cb-hover-gold cb-my-work__card"
              role="button"
              tabindex="0"
              [attr.aria-label]="it.uc + ' · ' + it.title"
              (click)="it.open($event)"
              (keydown.enter)="activate($event, it.open)"
              (keydown.space)="activate($event, it.open)"
            >
              <div class="cb-my-work__card-head">
                <span class="cb-my-work__card-uc">{{ it.uc }}</span>
                <cb-status-pill [label]="it.statusPill.label" [fg]="it.statusPill.fg" [bg]="it.statusPill.bg" [dense]="true" />
              </div>
              <div class="cb-my-work__card-title">{{ it.title }}</div>
              <div class="cb-my-work__card-sub">{{ it.sub }}</div>
              <div class="cb-my-work__card-foot">
                <div class="cb-my-work__who">
                  <span
                    class="cb-my-work__who-avatar"
                    [style.background]="it.whoColor"
                    >{{ it.who }}</span
                  >
                  <span class="cb-my-work__who-name">{{ it.whoName }}</span>
                </div>
                <div class="cb-my-work__actions">
                  @if (it.cta2Label) {
                    <button
                      type="button"
                      class="cb-my-work__cta2"
                      (click)="it.cta2!($event)"
                    >
                      {{ it.cta2Label }}
                    </button>
                  }
                  <button
                    type="button"
                    class="cb-hover-gold-strong cb-my-work__cta"
                    (click)="it.cta($event)"
                  >
                    {{ it.ctaLabel }}
                  </button>
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
