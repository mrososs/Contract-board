<div class="cb-role">
  <div class="cb-role__card">
    <div class="cb-role__body">
      <div class="cb-role__brand">
        <cb-brand-mark />
        <span class="cb-role__brand-name">
          ContractBoard
        </span>
      </div>

      <h2 class="cb-role__title">What's your role?</h2>
      <p class="cb-role__lede">
        This sets your board lens — what "My work" focuses on. It's not an access level, and
        you'll only be asked once.
      </p>

      <div class="cb-role__grid">
        @for (r of roles; track r.role) {
          <button type="button" class="cb-role__opt cb-hover-gold" [disabled]="busy()" (click)="pick(r.role)">
            <span class="cb-role__swatch" [style.background]="r.color"></span>
            <span class="cb-role__opt-label">{{ r.label }}</span>
            <span class="cb-role__opt-who">{{ r.who }}</span>
          </button>
        }
      </div>
    </div>
  </div>
</div>
